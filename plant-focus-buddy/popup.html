<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Plant Focus Buddy</title>
  <link rel="stylesheet" href="plant.css">
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <!-- Hero banner -->
  <div class="hero" id="hero">

<div class="hero-app-name">Plant Focus Buddy</div>
    <div class="hero-plant-wrap" id="popup-plant-wrap"></div>
    <div class="hero-info">
      <div class="hero-health-ring">
        <svg viewBox="0 0 72 72" class="ring-svg">
          <circle class="ring-track" cx="36" cy="36" r="30"/>
          <circle class="ring-fill" id="health-ring-arc" cx="36" cy="36" r="30"
            transform="rotate(-90 36 36)"
            stroke-dasharray="188.5"
            stroke-dashoffset="188.5"/>
        </svg>
        <div class="ring-label">
          <span class="ring-pct" id="health-num">--<small>%</small></span>
        </div>
      </div>
      <div class="state-badge" id="health-state">Loading…</div>
      <div class="health-message" id="health-message"></div>
    </div>
  </div>

  <div class="body-wrap">

    <!-- Settings card -->
    <div class="card">
      <div class="card-row">
        <div class="row-left">
          <span class="row-text">Show on all pages</span>
        </div>
        <label class="switch">
          <input type="checkbox" id="plant-visible-toggle" checked>
          <span class="slider"></span>
        </label>
      </div>

      <div class="card-divider"></div>

      <div class="card-row">
        <div class="row-left">
          <span class="row-text">Dark mode</span>
        </div>
        <label class="switch">
          <input type="checkbox" id="dark-mode-toggle">
          <span class="slider"></span>
        </label>
      </div>

      <div class="card-divider"></div>

      <div class="card-section-label">Leniency</div>
      <div class="leniency-grid">
        <button class="leniency-btn" data-leniency="relaxed">
          <svg viewBox="0 0 24 16" class="leniency-icon"><rect x="10" y="4" width="4" height="12" rx="1.5" fill="currentColor" opacity="0.25"/><rect x="10" y="9" width="4" height="7" rx="1.5" fill="currentColor"/></svg>
          <span>Relaxed</span>
        </button>
        <button class="leniency-btn" data-leniency="balanced">
          <svg viewBox="0 0 24 16" class="leniency-icon"><rect x="5" y="4" width="4" height="12" rx="1.5" fill="currentColor" opacity="0.25"/><rect x="5" y="9" width="4" height="7" rx="1.5" fill="currentColor"/><rect x="10" y="4" width="4" height="12" rx="1.5" fill="currentColor" opacity="0.25"/><rect x="10" y="6" width="4" height="10" rx="1.5" fill="currentColor"/></svg>
          <span>Balanced</span>
        </button>
        <button class="leniency-btn" data-leniency="strict">
          <svg viewBox="0 0 24 16" class="leniency-icon"><rect x="2" y="4" width="4" height="12" rx="1.5" fill="currentColor" opacity="0.25"/><rect x="2" y="8" width="4" height="8" rx="1.5" fill="currentColor"/><rect x="7" y="4" width="4" height="12" rx="1.5" fill="currentColor" opacity="0.25"/><rect x="7" y="5" width="4" height="11" rx="1.5" fill="currentColor"/><rect x="12" y="4" width="4" height="12" rx="1.5" fill="currentColor" opacity="0.25"/><rect x="12" y="4" width="4" height="12" rx="1.5" fill="currentColor"/></svg>
          <span>Strict</span>
        </button>
      </div>

      <div class="card-divider"></div>

      <div class="card-section-label">Plant Type</div>
      <div class="plant-type-grid">
        <button class="plant-type-btn" data-type="snake">
          <img class="plant-type-thumb" src="assets/snake-thriving.png" alt="Snake Plant">
          <span>Snake Plant</span>
        </button>
        <button class="plant-type-btn" data-type="monstera">
          <img class="plant-type-thumb" src="assets/monstera-thriving.png" alt="Monstera">
          <span>Monstera</span>
        </button>
          <button class="plant-type-btn" data-type="pothos">
              <img class="plant-type-thumb" src="assets/pothos-thriving.png" alt="Pothos">
              <span>Pothos</span>
          </button>
          <button class="plant-type-btn" data-type="lily">
              <img class="plant-type-thumb" src="assets/lily-thriving.png" alt="Lily">
              <span>Peace Lily</span>
          </button>
      </div>

      <div class="card-divider"></div>

      <div class="card-section-label">Position</div>
      <div class="position-grid">
        <button class="pos-btn" data-pos="top-left">
          <svg viewBox="0 0 32 24" class="pos-preview"><rect x="1" y="1" width="30" height="22" rx="3" fill="none" stroke="currentColor" stroke-width="1.5"/><circle cx="6" cy="6" r="3" fill="currentColor"/></svg>
          <span>Top Left</span>
        </button>
        <button class="pos-btn" data-pos="top-right">
          <svg viewBox="0 0 32 24" class="pos-preview"><rect x="1" y="1" width="30" height="22" rx="3" fill="none" stroke="currentColor" stroke-width="1.5"/><circle cx="26" cy="6" r="3" fill="currentColor"/></svg>
          <span>Top Right</span>
        </button>
        <button class="pos-btn" data-pos="bottom-left">
          <svg viewBox="0 0 32 24" class="pos-preview"><rect x="1" y="1" width="30" height="22" rx="3" fill="none" stroke="currentColor" stroke-width="1.5"/><circle cx="6" cy="18" r="3" fill="currentColor"/></svg>
          <span>Bottom Left</span>
        </button>
        <button class="pos-btn" data-pos="bottom-right">
          <svg viewBox="0 0 32 24" class="pos-preview"><rect x="1" y="1" width="30" height="22" rx="3" fill="none" stroke="currentColor" stroke-width="1.5"/><circle cx="26" cy="18" r="3" fill="currentColor"/></svg>
          <span>Bottom Right</span>
        </button>
      </div>
    </div>

    <!-- Sites card -->
    <div class="card">
      <div class="sites-section">
        <div class="sites-head">
          <span class="sites-dot good-dot"></span>
          <span class="sites-title">Focus Sites</span>
          <span class="sites-hint">grow your plant</span>
        </div>
        <div id="good-sites-list" class="sites-list"></div>
        <div class="site-input-row">
          <input type="text" id="good-site-input" placeholder="notion.so" class="site-input good-input">
          <button id="add-good-btn" class="add-btn good-add">+ Add</button>
        </div>
        <div class="input-error" id="good-error"></div>
      </div>

      <div class="card-divider"></div>

      <div class="sites-section">
        <div class="sites-head">
          <span class="sites-dot bad-dot"></span>
          <span class="sites-title">Distraction Sites</span>
          <span class="sites-hint">wilt your plant</span>
        </div>
        <div id="bad-sites-list" class="sites-list"></div>
        <div class="site-input-row">
          <input type="text" id="bad-site-input" placeholder="reddit.com" class="site-input bad-input">
          <button id="add-bad-btn" class="add-btn bad-add">+ Add</button>
        </div>
        <div class="input-error" id="bad-error"></div>
      </div>
    </div>

    <button id="reset-btn" class="reset-btn">Reset Plant Health</button>

    <div class="footer">v1.0.0</div>
  </div>

  <script src="plant.js"></script>
  <script src="plant-assets.js"></script>
  <script src="popup.js"></script>
</body>
</html>
