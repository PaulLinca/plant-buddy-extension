<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>New Tab</title>
  <link rel="stylesheet" href="plant.css">
  <link rel="stylesheet" href="newtab.css">
</head>
<body>
  <div class="bg-orb orb-1"></div>
  <div class="bg-orb orb-2"></div>
  <div class="bg-orb orb-3"></div>

  <div class="newtab-container">

    <div class="clock-section">
      <div class="clock" id="clock">00:00</div>
      <div class="date" id="date-label"></div>
    </div>

    <div id="newtab-plant-wrap" class="newtab-plant-wrap"></div>

    <div class="health-section">
      <div class="health-row">
        <span class="state-pill" id="state-label">Loading…</span>
        <span class="health-pct-label"><span id="health-pct">--</span>%</span>
      </div>
      <div class="health-bar-bg">
        <div class="health-bar-fill" id="health-bar"></div>
        <div class="health-bar-glow" id="health-glow"></div>
      </div>
    </div>

    <div class="health-message" id="health-message"></div>

    <div class="stats-row">
      <div class="stat-card">
        <div class="stat-value" id="stat-good">--</div>
        <div class="stat-label">Focus</div>
      </div>
      <div class="stat-card">
        <div class="stat-value" id="stat-bad">--</div>
        <div class="stat-label">Distracted</div>
      </div>
    </div>

    <div class="shortcuts-row" id="shortcuts-row"></div>

    <a class="manage-link" href="#" id="manage-sites-link">⚙ Manage sites</a>
    <button class="test-toggle-btn" id="test-toggle-btn">Show plant states</button>

  </div>

  <!-- Test view overlay -->
  <div class="test-overlay" id="test-overlay">
    <div class="test-panel">
      <div class="test-header">
        <span class="test-title">Plant States</span>
        <button class="test-close-btn" id="test-close-btn">✕</button>
      </div>
      <div class="test-states-row" id="test-states-row"></div>
    </div>
  </div>

  <script src="plant.js"></script>
  <script src="plant-assets.js"></script>
  <script src="newtab.js"></script>
</body>
</html>
